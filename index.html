<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Bus Pass System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Cloud Bus Pass System</h1>

    <div class="form-box">

        <input type="text" id="name" placeholder="Enter Passenger Name">

        <input type="text" id="from" placeholder="From">

        <input type="text" id="to" placeholder="To">

        <input type="date" id="date">

        <button onclick="generatePass()">Generate Pass</button>

    </div>

    <div class="pass-box" id="pass-box">

        <h2>Bus Pass</h2>

        <p><strong>Name:</strong> <span id="pname"></span></p>

        <p><strong>From:</strong> <span id="pfrom"></span></p>

        <p><strong>To:</strong> <span id="pto"></span></p>

        <p><strong>Date:</strong> <span id="pdate"></span></p>

        <p><strong>Pass ID:</strong> <span id="pid"></span></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
