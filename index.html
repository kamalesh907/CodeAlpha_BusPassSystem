<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">

        <div class="logo">🚌</div>

        <h1>Cloud Bus Pass System</h1>

        <p class="subtitle">
            Fast • Secure • Digital Ticket Booking
        </p>

        <div class="input-box">
            <label>Passenger Name</label>
            <input type="text" id="name" placeholder="Enter passenger name">
        </div>

        <div class="row">

            <div class="input-box">
                <label>From</label>
                <input type="text" id="from" placeholder="Starting location">
            </div>

            <div class="input-box">
                <label>To</label>
                <input type="text" id="to" placeholder="Destination">
            </div>

        </div>

        <div class="input-box">
            <label>Travel Date</label>
            <input type="date" id="date">
        </div>

        <button onclick="generatePass()">
            Generate Bus Pass
        </button>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="pass-box" id="pass-box">

            <h2>🎫 Digital Bus Pass</h2>

            <div class="detail">
                <span>Name</span>
                <strong id="pname"></strong>
            </div>

            <div class="detail">
                <span>From</span>
                <strong id="pfrom"></strong>
            </div>

            <div class="detail">
                <span>To</span>
                <strong id="pto"></strong>
            </div>

            <div class="detail">
                <span>Date</span>
                <strong id="pdate"></strong>
            </div>

            <div class="detail">
                <span>Pass ID</span>
                <strong id="pid"></strong>
            </div>

        </div>

    </div>

</div>

</body>
