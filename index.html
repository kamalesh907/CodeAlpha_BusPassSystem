<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Bus Pass System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>🚌 Cloud Bus Pass System</h1>
        <p>Fast • Secure • Digital Ticket Booking</p>
    </div>

    <div class="form-box">

        <div class="input-group">
            <label for="name">Passenger Name</label>
            <input type="text" id="name" placeholder="Enter passenger name">
        </div>

        <div class="row">

            <div class="input-group">
                <label for="from">From</label>
                <input type="text" id="from" placeholder="Starting location">
            </div>

            <div class="input-group">
                <label for="to">To</label>
                <input type="text" id="to" placeholder="Destination">
            </div>

        </div>

        <div class="input-group">
            <label for="date">Travel Date</label>
            <input type="date" id="date">
        </div>

        <button onclick="generatePass()">
            Generate Bus Pass
        </button>

    </div>

    <div class="pass-box" id="pass-box">

        <div class="ticket-header">
            <h2>🎫 Digital Bus Pass</h2>
        </div>

        <div class="ticket-details">

            <div class="detail">
                <span>Name</span>
                <strong id="pname"></strong>
            </div>

            <div class="detail">
                <span>From</span>
                <strong id="pfrom"></strong>
            </div>

            <div class="detail">
                <span>To</span>
                <strong id="pto"></strong>
            </div>

            <div class="detail">
                <span>Date</span>
                <strong id="pdate"></strong>
            </div>

            <div class="detail">
                <span>Pass ID</span>
                <strong id="pid"></strong>
            </div>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
