<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Bus Pass System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>🚌 Cloud Bus Pass System</h1>

    <div class="form-box">

        <div class="input-group">
            <label>Passenger Name</label>
            <input type="text" id="name" placeholder="Enter your name">
        </div>

        <div class="input-group">
            <label>From</label>
            <input type="text" id="from" placeholder="Starting location">
        </div>

        <div class="input-group">
            <label>To</label>
            <input type="text" id="to" placeholder="Destination">
        </div>

        <div class="input-group">
            <label>Travel Date</label>
            <input type="date" id="date">
        </div>

        <button onclick="generatePass()">Generate Bus Pass</button>

    </div>

    <div class="pass-box" id="pass-box">

        <h2>🎫 Digital Bus Pass</h2>

        <p><strong>Name:</strong> <span id="pname"></span></p>

        <p><strong>From:</strong> <span id="pfrom"></span></p>

        <p><strong>To:</strong> <span id="pto"></span></p>

        <p><strong>Date:</strong> <span id="pdate"></span></p>

        <p><strong>Pass ID:</strong> <span id="pid"></span></p>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
